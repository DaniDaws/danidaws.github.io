    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:type" content="website" />

    <meta
      property="og:description"
      content="Software developer specialising in frontend engineering, UI/UX, solution design, backend development, and SQL-backed systems."

    <meta property="og:url" content="https://danidaws.github.io/" />

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <script>
      (() => {
        try {
          const saved = localStorage.getItem("portfolio-theme");
          const systemDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          const theme = saved || (systemDark ? "dark" : "light");

          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
